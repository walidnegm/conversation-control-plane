# Phase 1b extraction manifest — Conversation Control Plane SDK portable slice.
# Source of truth: Bot0 monorepo. Destination: github.com/walidnegm/conversation-control-plane
#
# Public bundle is intentionally small: README + SDK contract + lifecycle diagram.
# Operational runbooks (loop, trace export, scale smoke) stay in the monorepo only.

sdk_version: "0.1.0-extract"
contract_doc: docs/epics/conversation-control-plane-sdk.md
public_repo: https://github.com/walidnegm/conversation-control-plane

modules:
  - api/services/conversation_control/chat_dispatch_contract.py
  - api/services/conversation_control/delivery_order_contract.py
  - api/services/conversation_control/sdk_identity.py
  - api/services/conversation_control/contract.py
  - api/services/conversation_control/decide.py
  - api/services/conversation_control/dispatch_phase.py
  - api/services/conversation_control/discovery_intent.py
  - api/services/conversation_control/ledger.py
  - api/services/conversation_control/ledger_keys.py
  - api/services/conversation_control/ledger_journal.py
  - api/services/conversation_control/ledger_outbox.py
  - api/services/conversation_control/control_payload.py
  - api/services/conversation_control/kind_spec.py
  - api/services/conversation_control/projection_rebuild.py
  - api/services/conversation_control/handoff_guard.py
  - api/services/conversation_control/post_save_setup_entry.py
  # Portable multi-turn continue gates (self-contained; no private product handlers).
  - api/services/conversation_control/multi_turn_stream_contract.py

docs:
  - docs/epics/conversation-control-plane-sdk.md
  - docs/epics/conversation-turn-lifecycle-diagram.md

public_bundle:
  readme: README.md
  docs:
    - conversation-control-plane-sdk.md
    - conversation-turn-lifecycle-diagram.md
  replace_section_15: docs/section-15-public.md
  sanitize_lifecycle: true  # §7 bot0.py anchors → portable reference/ modules
  # Monorepo-only (implementation playbook / docs/epics/) — not published:
  # - conversation-control-plane-loop-playbook.md  → SDK §3.1
  # - conversation-control-plane-trace-export.md   → SDK §11.1
  # - conversation-control-plane-scale-smoke.md    → SDK §3.1 Q1, §11.2

examples:
  - extract/conversation-control-plane/examples/README.md
  - extract/conversation-control-plane/examples/cyber_risk_assessment/

regression_pins:
  - regression_suite/test_chat_dispatch_contract.py
  - regression_suite/test_delivery_order_contract.py
  - regression_suite/test_control_plane_sdk_deliverables.py
  - regression_suite/test_public_sdk_publish_bundle.py
  - regression_suite/test_decide_turn_control_plane.py